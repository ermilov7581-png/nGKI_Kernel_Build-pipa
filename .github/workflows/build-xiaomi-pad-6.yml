name: Build Xiaomi Pad 6 (LineageOS 22)

on:
  workflow_call:
  workflow_dispatch:

env:
  # Настройки устройства
  DEVICE_NAME : "xiaomi_pad_6"
  DEVICE_CODENAME : "pipa"

  CUSTOM_CMDS : "CROSS_COMPILE=aarch64-linux-gnu- CLANG_TRIPLE=aarch64-linux-gnu- TARGET_PRODUCT=pipa"
  EXTRA_CMDS : "LLVM=1 LLVM_IAS=1"

  # Исходники ядра от liyafe1997
  KERNEL_SOURCE : "https://github.com/liyafe1997/kernel_xiaomi_sm8250_mod.git"
  KERNEL_BRANCH : "android15-lineage22-mod-upgrade-susfs"

  # Для ядер 4.19 на Snapdragon 870 используем Proton Clang (он стабильнее всего)
  CLANG_SOURCE : "https://github.com/bachnxuan/aosp_clang_mirror/releases/download/clang-r563880c-13989888/clang-r563880c.tar.gz"
  CLANG_BRANCH : ""

  GCC_GNU : false
  GCC_64_SOURCE : "https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9.git"
  GCC_64_BRANCH : "android12L-release"
  GCC_32_SOURCE : "https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9.git"
  GCC_32_BRANCH : "android12L-release"

  DEFCONFIG_SOURCE: ""
  # Базовый дефконфиг процессора Snapdragon 870
  DEFCONFIG_NAME : "vendor/kona_defconfig"
  DEFCONFIG_ORIGIN_IMAGE: ""
  DEFCONFIG_FROM_BOOT: false

  KERNELSU_SOURCE : ""
  KERNELSU_BRANCH : ""

  # Настройка KernelSU-Next (Автоматический подбор ветки legacy для 4.19)
  KERNELSU_AUTO_GET : "true"
  KERNELSU_AUTO_FORK : "next" # "next" означает принудительный выбор KernelSU-Next

  # Включаем маскировку SuSFS
  SUSFS_ENABLE : false
  SUSFS_FIXED : false

  AK3_SOURCE : "https://github.com/osm0sis/AnyKernel3.git"
  AK3_BRANCH : "master"

  BOOT_SOURCE : ""

  NEED_DTBO : false   # Автор ядра строго запретил шить dtbo на pipa! Включаем false
  NEED_SAFE_DTBO : false

  ROM_TEXT : "Immortal_kernel"

  # Системные настройки билдера
  PYTHON_VERSION: "3"
  PACK_METHOD: "Anykernel3"
  PACK_KMODULES: "false"
  KERNELSU_METHOD: "shell"

  PATCHES_SOURCE: ""
  PATCHES_BRANCH: ""
  SUSFS_FOLDER_FIXED: ""
  SUSFS_PATCH_FIXED: ""
  REKERNEL_ENABLE: "false"

  # Самый важный параметр для предотвращения бутлупа ядра 4.19 (ручные syscall-хуки)
  HOOK_METHOD: "syscall"
  KERNEL_PATCH: "false"
  KPM_ENABLE: "false"
  KPM_INLINE: "false"
  KPM_KPATCH_NEXT: "false"
  KPM_PATCH_SOURCE: ""

  BASEBAND_GUARD_ENABLE: "false"
  BASEBAND_GUARD_BOOT: "false"
  HIDE_STUFF: "false"

  GENERATE_DTB: "false"
  GENERATE_CHIP: "qcom"

  BUILD_DEBUGGER: "false"
  SKIP_PATCH: "false"

  # Слияние модульных конфигураций Xiaomi (то, что мы раскопали в папках!)
  BUILD_OTHER_CONFIG: "true"
  MERGE_CONFIG_FILES: "vendor/xiaomi/pipa.config"


  FREE_MORE_SPACE: "false"

jobs:
  build-kernel:
    name: Xiaomi Pad 6 (LineageOS 22)
    runs-on: ubuntu-latest
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"

    steps:
      - name: ⏰ Checkout repository
        uses: actions/checkout@v6

      - name: ⌛️ Compilation environment preparation
        uses: ./.github/workflows/build-env

      - name: ⚙️ Get neccssary tools
        uses: ./.github/workflows/build-ready

      - name: 🪝 Patch Kernel of SUSFS
        uses: ./.github/workflows/patch-susfs

      - name: 🔗 Patch for no-kprobe
        uses: ./.github/workflows/patch-no-kprobe

      - name: 🪛 Extra Kernel Options
        run: |
          cd $GITHUB_WORKSPACE/device_kernel
          # Принудительно отключаем kprobes в итоговом дефконфиге перед сборкой
          echo "CONFIG_KPROBES=n" >> arch/arm64/configs/vendor/kona_defconfig
          echo "CONFIG_HAVE_KPROBES=n" >> arch/arm64/configs/vendor/kona_defconfig
          echo 'CONFIG_LOCALVERSION="-immrtl"' >> arch/arm64/configs/vendor/kona_defconfig
          # Вручную подкидываем недостающие заголовочные файлы SuSFS, чтобы не было "file not found"
          mkdir -p include/linux
          curl -sSL "https://githubusercontent.com/susfs4android/susfs4android/main/Kernel_Patches/Kernel_Headers/susfs_def.h" -o include/linux/susfs_def.h
          curl -sSL "https://githubusercontent.com/susfs4android/susfs4android/main/Kernel_Patches/Kernel_Headers/susfs.h" -o include/linux/susfs.h

      - name: 🧰 Patch Kernel of Re:Kernel
        uses: ./.github/workflows/patch-rekernel

      - name: 🔒 Patch Kernel of Baseband Guard
        uses: ./.github/workflows/patch-baseband-guard

      - name: 🔧 Patch Hide Stuff
        uses: ./.github/workflows/patch-hide-stuff

      - name: 🚀 Build Process
        uses: ./.github/workflows/build-process

      - name: 🔩 Pack Process
        uses: ./.github/workflows/pack-process

      - name: ✏️ Upload Artifacts
        uses: ./.github/workflows/upload-files
