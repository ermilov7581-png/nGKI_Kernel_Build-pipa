name: Build Kernel

permissions:
  contents: write
  actions: write

on:
  workflow_call:

jobs:
  # Xiaomi
  build-poco-x5-5g-lineageos23-a16:
    name: "Build POCO X5 5G (LineageOS 23.2 A16)"
    strategy:
      fail-fast: true
    uses: ./.github/workflows/build-poco-x5-5g-lineageos23-a16.yml
    secrets: inherit

  # Nothing
  build-nothing-phone-1-lineageos23-a16:
    name: "Nothing Phone (1) (LineageOS 23.0 A16)"
    strategy:
      fail-fast: true
    uses: ./.github/workflows/build-nothing-phone-1-lineageos23-a16.yml
    secrets: inherit

  build-nothing-phone-1-evox-a16-qpr2:
    name: "Nothing Phone (1) (EvolutionX A16 QPR2)"
    strategy:
      fail-fast: true
    uses: ./.github/workflows/build-nothing-phone-1-evox-a16-qpr2.yml
    secrets: inherit  
